kind = "web"
previewPath = "/"
title = "Hazel's Archive"
version = "1.0.0"
id = "artifacts/hazel-archive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23331

[services.development]
run = "pnpm --filter @workspace/hazel-archive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hazel-archive", "run", "build" ]
publicDir = "artifacts/hazel-archive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23331"
BASE_PATH = "/"
